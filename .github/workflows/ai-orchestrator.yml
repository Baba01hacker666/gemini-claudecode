name: AI Orchestrator

on:
  issues:
    types: [labeled]
  pull_request:
    types: [opened, synchronize, reopened, labeled]

jobs:
  jules-task:
    if: github.event_name == 'issues' && github.event.label.name == 'jules'
    runs-on: ubuntu-latest
    steps:
      - name: Log Jules task handoff
        run: |
          echo "Issue labeled for Jules:"
          echo "Repo: ${{ github.repository }}"
          echo "Issue: #${{ github.event.issue.number }}"
          echo "Title: ${{ github.event.issue.title }}"
          echo "This workflow is only the coordinator."
          echo "Jules GitHub integration should pick this up."

  codex-review-hint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
      issues: write
    steps:
      - name: Comment review protocol
        uses: actions/github-script@v7
        with:
          script: |
            const body = `
            @codex review

            Review this PR as the hardening agent.

            Focus on:
            - correctness
            - security issues
            - broken assumptions
            - missing regression tests
            - excessive scope

            Format:
            1. Blocking
            2. Non-blocking
            3. Optional hardening
            `;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
